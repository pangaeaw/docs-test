name: Task
description: Eine Sub-Task zu einem Epic erstellen
title: "[TASK] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        ## Sub-Task erstellen
        Tasks sind konkrete Arbeitseinheiten, die einem Epic zugeordnet sind.

  - type: input
    id: epic_ref
    attributes:
      label: Parent Epic
      description: "Issue-Nummer des zugehörigen Epics (z.B. #42)"
      placeholder: "#"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Task-Titel
      description: Was genau soll umgesetzt werden?
      placeholder: z.B. "Login-Endpoint implementieren"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Beschreibung
      description: Detaillierte Beschreibung der Aufgabe
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priorität
      options:
        - "🔴 Hoch"
        - "🟡 Mittel"
        - "🟢 Niedrig"
    validations:
      required: true

  - type: input
    id: estimate
    attributes:
      label: Schätzung (Story Points / Stunden)
      placeholder: z.B. "3 SP" oder "4h"

  - type: input
    id: assignee
    attributes:
      label: Assignee
      placeholder: "@username"

  - type: checkboxes
    id: definition_of_done
    attributes:
      label: Definition of Done
      options:
        - label: Code implementiert
        - label: Tests geschrieben
        - label: Review abgeschlossen
        - label: Deployed / Merged
